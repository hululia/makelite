<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPod Classic - Pro Media Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root {
            --ipod-bg: linear-gradient(135deg, #e0e0e0 0%, #b0b0b0 100%);
            --screen-bg: #f5f5f7;
            --apple-blue: #007aff;
            --apple-red: #ff3b30;
        }

        body {
            background-color: #1a1a1a; display: flex; justify-content: center;
            align-items: center; height: 100vh; margin: 0;
            font-family: -apple-system, "Helvetica Neue", sans-serif;
            overflow: hidden; user-select: none;
        }

        .ipod {
            width: 320px; height: 520px; background: var(--ipod-bg);
            border-radius: 38px; box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.8);
            padding: 22px; display: flex; flex-direction: column; align-items: center;
            border: 1px solid #999;
        }

        /* 更新：宽度 300px，下移 2px */
        .screen {
            width: 300px; height: 215px; background-color: #000;
            border: 3px solid #222; border-radius: 6px; overflow: hidden;
            position: relative; display: flex; flex-direction: column;
            margin-top: 2px; 
        }

        .status-bar {
            height: 22px; background: linear-gradient(to bottom, #eee, #bbb);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 8px; font-size: 11px; font-weight: bold; color: #333;
            border-bottom: 1px solid #666; z-index: 100; flex-shrink: 0;
        }

        .content-area { flex: 1; background: #fff; position: relative; overflow: hidden; }

        /* 导入界面 */
        #import-view {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; text-align: center; padding: 20px; box-sizing: border-box;
        }
        .import-btn {
            background: var(--apple-blue); color: white; border: none;
            padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer;
            margin-bottom: 10px; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .import-btn:active { background: #0056b3; }

        /* 列表视图与左滑删除 UI */
        #list-view { width: 100%; height: 100%; display: none; }
        
        .menu-item-wrapper {
            position: relative; overflow: hidden; background: #fff;
            border-bottom: 1px solid #eee;
        }
        
        .delete-btn {
            position: absolute; right: 0; top: 0; bottom: 0; width: 70px;
            background-color: var(--apple-red); color: white; display: flex;
            align-items: center; justify-content: center; font-weight: bold;
            font-size: 13px; cursor: pointer; z-index: 1;
        }

        .menu-item {
            padding: 10px 12px; font-size: 14px; font-weight: bold;
            display: flex; justify-content: space-between; align-items: center;
            background: #fff; position: relative; z-index: 2;
            cursor: pointer;
        }
        /* 当没有在拖拽时，点击出现经典蓝色高亮 */
        .menu-item:active { background: #f0f0f5; }

        /* Cover Flow */
        #cover-flow-view {
            width: 100%; height: 100%; background: #000; display: none;
            perspective: 800px; overflow: hidden;
        }
        .cf-container {
            width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
            display: flex; align-items: center; justify-content: center;
        }
        .album-card {
            position: absolute; width: 110px; height: 110px;
            background-size: cover; background-position: center; background-color: #333;
            transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1); cursor: pointer;
            -webkit-box-reflect: below 2px linear-gradient(transparent, transparent 60%, rgba(255, 255, 255, 0.2));
            border-radius: 4px; border: 1px solid #222;
        }
        .album-info-overlay {
            position: absolute; bottom: 10px; width: 100%; text-align: center; color: white;
            font-size: 12px; text-shadow: 0 1px 3px rgba(0,0,0,0.8); pointer-events: none;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 10px; box-sizing: border-box;
        }

        /* 播放界面 */
        #player-view {
            width: 100%; height: 100%; display: none; flex-direction: column;
            padding: 15px; box-sizing: border-box; background: #fff;
        }
        .player-header { display: flex; gap: 15px; }
        .player-art { width: 100px; height: 100px; border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); object-fit: cover; background: #000; flex-shrink: 0; }
        .player-meta { width: 140px; overflow: hidden; }
        .player-meta h3 { margin: 0; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-meta p { margin: 5px 0; font-size: 12px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .progress-box { margin-top: 30px; }
        .track-bar { width: 100%; height: 18px; background: #eee; border: 1px solid #ccc; position: relative; cursor: pointer; }
        .track-fill { height: 100%; background: var(--apple-blue); width: 0%; pointer-events: none;}

        /* 轮盘 */
        .click-wheel {
            width: 210px; height: 210px; background-color: #fff; border-radius: 50%;
            margin-top: 35px; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer;
        }
        .wheel-btn { position: absolute; font-size: 13px; font-weight: bold; color: #999; }
        .btn-menu { top: 15px; left: 50%; transform: translateX(-50%); }
        .btn-next { right: 15px; top: 50%; transform: translateY(-50%); }
        .btn-prev { left: 15px; top: 50%; transform: translateY(-50%); }
        .btn-play { bottom: 15px; left: 50%; transform: translateX(-50%); }
        .center-select {
            width: 75px; height: 75px; background: linear-gradient(135deg, #eee, #ccc);
            border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            box-shadow: inset 0 1px 3px white, 0 2px 5px rgba(0,0,0,0.2);
        }
        .center-select:active { background: #bbb; }
    </style>
</head>
<body>

<div class="ipod">
    <div class="screen">
        <div class="status-bar">
            <span id="back-btn" onclick="hapticTap(10); goHome()" style="cursor:pointer">◀ Menu</span>
            <span id="clock">12:00</span>
            <span onclick="hapticTap(15); document.getElementById('file-input').click()" style="cursor:pointer; font-size: 12px;" title="Add More">🔋 ➕</span>
        </div>
        
        <div class="content-area">
            <div id="import-view">
                <input type="file" id="file-input" accept=".mp3,.wav,.flac,.mp4,audio/*,video/mp4" multiple style="display:none">
                <button class="import-btn" onclick="hapticTap(20); document.getElementById('file-input').click()">Import Media (Audio/Video)</button>
                <p style="font-size: 12px; color: #666; margin-top:10px;">MP3, WAV, FLAC, MP4 (Max 1000)</p>
                <p id="loading-text" style="font-size: 12px; color: var(--apple-blue); font-weight:bold;"></p>
            </div>

            <div id="list-view">
                <div class="menu-item-wrapper" onclick="hapticTap(10); showCoverFlow()">
                    <div class="menu-item"><span>Cover Flow</span><span>&gt;</span></div>
                </div>
                <div class="menu-item-wrapper" onclick="hapticTap(10); toggleSongList()">
                    <div class="menu-item"><span>Media Library (<span id="song-count">0</span>)</span><span>&gt;</span></div>
                </div>
                <div id="song-list-container" style="overflow-y:auto; height:155px; display:none;"></div>
            </div>

            <div id="cover-flow-view">
                <div class="cf-container" id="cf-container"></div>
                <div class="album-info-overlay" id="cf-info">Artist - Title</div>
            </div>

            <div id="player-view">
                <div class="player-header">
                    <img src="" id="p-img" class="player-art">
                    <video id="main-media" class="player-art" style="display:none;" playsinline></video>
                    <div class="player-meta">
                        <h3 id="p-title">Title</h3>
                        <p id="p-artist">Artist</p>
                        <p id="p-type" style="font-size:10px; color:#999">Local Media</p>
                    </div>
                </div>
                <div class="progress-box">
                    <div class="track-bar" id="track-bar" onclick="hapticTap(10); seek(event)">
                        <div class="track-fill" id="track-fill"></div>
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size:10px; margin-top:5px;">
                        <span id="time-cur">0:00</span>
                        <span id="time-total">0:00</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="click-wheel">
        <div class="wheel-btn btn-menu" onclick="hapticTap(15); goHome()">MENU</div>
        <div class="wheel-btn btn-next" onclick="hapticTap(15); nextSong()">▶▶|</div>
        <div class="wheel-btn btn-prev" onclick="hapticTap(15); prevSong()">|◀◀</div>
        <div class="wheel-btn btn-play" onclick="hapticTap(15); playPause()">▶||</div>
        <div class="center-select" onclick="hapticTap(20); handleCenterClick()"></div>
    </div>
</div>

<script>
    // --- 核心触觉反馈函数 ---
    function hapticTap(strength = 20) {
        try {
            if (navigator.vibrate) {
                navigator.vibrate(strength);
                return true;
            }
        } catch (e) {}
        return false;
    }

    let playlist = [];
    let currentIndex = 0;
    let cfIndex = 0;
    let currentMode = 'import'; 
    
    const media = document.getElementById('main-media');
    
    const defaultAudioCover = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23ddd"/><text x="50" y="55" font-family="sans-serif" font-size="40" fill="%23999" text-anchor="middle">🎵</text></svg>';
    const defaultVideoCover = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23ddd"/><text x="50" y="55" font-family="sans-serif" font-size="40" fill="%23999" text-anchor="middle">🎬</text></svg>';

    // 1. 本地文件追加读取与解析
    document.getElementById('file-input').addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        const availableSlots = 1000 - playlist.length;
        
        if (availableSlots <= 0) {
            alert("Maximum limit of 1000 items reached!");
            return;
        }

        const filesToAdd = files.slice(0, availableSlots);
        if(filesToAdd.length === 0) return;

        const loadingText = document.getElementById('loading-text');
        const clockElem = document.getElementById('clock');
        const originalClock = clockElem.innerText;
        
        if (currentMode === 'import') loadingText.innerText = `Loading...`;
        clockElem.innerText = "Load..."; 
        
        for (let i = 0; i < filesToAdd.length; i++) {
            const file = filesToAdd[i];
            const isVideo = file.type.startsWith('video') || file.name.toLowerCase().endsWith('.mp4');
            const fileURL = URL.createObjectURL(file);
            
            const extMatch = file.name.match(/\.([^.]+)$/);
            const ext = extMatch ? extMatch[1].toUpperCase() : 'AUDIO';

            let trackInfo = { 
                id: playlist.length, 
                title: file.name.replace(/\.[^/.]+$/, ""), 
                artist: isVideo ? 'Video/MTV' : 'Unknown Artist', 
                cover: isVideo ? defaultVideoCover : defaultAudioCover, 
                url: fileURL,
                isVideo: isVideo,
                typeLabel: isVideo ? 'MP4 Video' : `${ext} Audio`
            };

            if (!isVideo) {
                await new Promise((resolve) => {
                    jsmediatags.read(file, {
                        onSuccess: function(tag) {
                            const tags = tag.tags;
                            if(tags.title) trackInfo.title = tags.title;
                            if(tags.artist) trackInfo.artist = tags.artist;
                            if(tags.picture) {
                                let base64String = "";
                                const data = tags.picture.data;
                                for (let j = 0; j < data.length; j++) base64String += String.fromCharCode(data[j]);
                                trackInfo.cover = `data:${tags.picture.format};base64,${window.btoa(base64String)}`;
                            }
                            resolve();
                        },
                        onError: function(error) { resolve(); } 
                    });
                });
            }
            
            playlist.push(trackInfo);
        }

        clockElem.innerText = originalClock;
        if (currentMode === 'import') loadingText.innerText = "Done!";
        document.getElementById('song-count').innerText = playlist.length;
        
        initListView();
        
        if (currentMode === 'import') {
            setTimeout(goHome, 500);
        } else if (currentMode === 'cover-flow') {
            renderCF();
        }

        e.target.value = '';
    });

    // 2. 初始化列表并附加【左滑删除】逻辑
    function initListView() {
        const container = document.getElementById('song-list-container');
        container.innerHTML = '';
        playlist.forEach((s, idx) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'menu-item-wrapper';

            // 删除按钮（底层）
            const delBtn = document.createElement('div');
            delBtn.className = 'delete-btn';
            delBtn.innerText = 'Delete';
            delBtn.onclick = (e) => {
                e.stopPropagation();
                deleteSong(idx);
            };

            // 内容区（上层，可滑动）
            const div = document.createElement('div');
            div.className = 'menu-item';
            div.style.fontSize = '12px';
            div.innerHTML = `<span>${s.isVideo ? '🎬' : '🎵'} ${s.title}</span>`;

            // 滑动逻辑监听器
            let startX = 0;
            let isDragging = false;

            const handleStart = (clientX) => {
                startX = clientX;
                isDragging = true;
                div.style.transition = 'none'; // 滑动时取消动画，跟手
            };

            const handleMove = (clientX) => {
                if (!isDragging) return;
                let diff = clientX - startX;
                // 只能向左滑，且最多滑出 70px (删除按钮的宽度)
                if (diff < 0) {
                    div.style.transform = `translateX(${Math.max(diff, -70)}px)`;
                } else {
                    div.style.transform = `translateX(0px)`;
                }
            };

            const handleEnd = (clientX) => {
                if (!isDragging) return;
                isDragging = false;
                div.style.transition = 'transform 0.2s ease'; // 松手时加上动画
                
                let diff = clientX - startX;
                if (diff < -35) {
                    // 滑动超过一半，吸附打开删除按钮
                    div.style.transform = `translateX(-70px)`;
                    hapticTap(15);
                } else {
                    // 滑动不够，弹回原位
                    div.style.transform = `translateX(0px)`;
                    
                    // 如果基本没有移动距离（绝对值 < 5px），判定为点击事件 -> 播放音乐
                    if (Math.abs(diff) < 5) {
                        hapticTap(10);
                        playSong(idx);
                    }
                }
            };

            // 绑定 Touch 事件 (手机)
            div.addEventListener('touchstart', e => handleStart(e.touches[0].clientX), {passive: true});
            div.addEventListener('touchmove', e => handleMove(e.touches[0].clientX), {passive: true});
            div.addEventListener('touchend', e => handleEnd(e.changedTouches[0].clientX));

            // 绑定 Mouse 事件 (电脑)
            div.addEventListener('mousedown', e => handleStart(e.clientX));
            div.addEventListener('mousemove', e => handleMove(e.clientX));
            div.addEventListener('mouseup', e => handleEnd(e.clientX));
            div.addEventListener('mouseleave', e => { if(isDragging) handleEnd(e.clientX); });

            wrapper.appendChild(delBtn);
            wrapper.appendChild(div);
            container.appendChild(wrapper);
        });
    }

    // 专门处理删除逻辑的函数
    function deleteSong(idx) {
        hapticTap(30); // 强震动反馈删除动作
        const wasPlaying = (currentIndex === idx && currentMode === 'player');
        
        // 从列表中移除
        playlist.splice(idx, 1);
        document.getElementById('song-count').innerText = playlist.length;
        
        // 调整游标以防止越界错乱
        if (currentIndex > idx) currentIndex--;
        if (cfIndex > idx) cfIndex--;
        if (cfIndex >= playlist.length) cfIndex = Math.max(0, playlist.length - 1);
        
        // 如果删光了
        if (playlist.length === 0) {
            media.pause();
            goHome();
        } 
        // 如果删掉的是正在播放的歌
        else if (wasPlaying) {
            media.pause();
            goHome(); // 退回主界面
        } 
        // 重新渲染当前视图
        else if (currentMode === 'cover-flow') {
            renderCF();
        }

        // 重新渲染列表 UI
        initListView();
    }

    // --- 以下为原有的视图控制和播放逻辑 ---

    function hideAllViews() {
        document.getElementById('import-view').style.display = 'none';
        document.getElementById('list-view').style.display = 'none';
        document.getElementById('cover-flow-view').style.display = 'none';
        document.getElementById('player-view').style.display = 'none';
    }

    function goHome() {
        if(playlist.length === 0) return; 
        hideAllViews();
        document.getElementById('list-view').style.display = 'block';
        currentMode = 'list';
    }

    function toggleSongList() {
        const container = document.getElementById('song-list-container');
        container.style.display = container.style.display === 'none' ? 'block' : 'none';
    }

    function showCoverFlow() {
        if(playlist.length === 0) return alert('Please add media first!');
        hideAllViews();
        document.getElementById('cover-flow-view').style.display = 'flex';
        currentMode = 'cover-flow';
        renderCF();
    }

    function renderCF() {
        const cfContainer = document.getElementById('cf-container');
        cfContainer.innerHTML = '';
        playlist.forEach((s, idx) => {
            const img = document.createElement('div');
            img.className = 'album-card';
            img.style.backgroundImage = `url("${s.cover}")`;
            img.onclick = () => {
                hapticTap(10); 
                if(idx === cfIndex) playSong(idx);
                else { cfIndex = idx; updateCFPositions(); }
            };
            cfContainer.appendChild(img);
        });
        updateCFPositions();
    }

    function updateCFPositions() {
        const cards = document.querySelectorAll('.album-card');
        cards.forEach((card, idx) => {
            let offset = idx - cfIndex;
            let z = -Math.abs(offset) * 100;
            let x = offset * 45;
            let rotate = offset * -45;

            if(offset === 0) {
                z = 100; x = 0; rotate = 0;
                card.style.opacity = "1";
                document.getElementById('cf-info').innerText = `${playlist[idx].artist} - ${playlist[idx].title}`;
            } else {
                x += (offset > 0 ? 80 : -80);
                card.style.opacity = Math.abs(offset) > 3 ? "0" : "0.7";
            }
            card.style.transform = `translateX(${x}px) translateZ(${z}px) rotateY(${rotate}deg)`;
            card.style.zIndex = 100 - Math.abs(offset);
        });
    }

    // Cover Flow 滑动支持
    let touchStartX = 0;
    document.getElementById('cover-flow-view').addEventListener('touchstart', e => touchStartX = e.touches[0].clientX);
    document.getElementById('cover-flow-view').addEventListener('touchend', e => {
        let diff = touchStartX - e.changedTouches[0].clientX;
        if(Math.abs(diff) > 30 && playlist.length > 0) {
            hapticTap(15); 
            if(diff > 0) { cfIndex = Math.min(cfIndex + 1, playlist.length - 1); } 
            else { cfIndex = Math.max(cfIndex - 1, 0); }
            updateCFPositions();
        }
    });

    // 播放与媒体控制
    function playSong(idx) {
        if(playlist.length === 0) return;
        currentIndex = idx;
        const s = playlist[idx];
        
        media.src = s.url;
        document.getElementById('p-title').innerText = s.title;
        document.getElementById('p-artist').innerText = s.artist;
        document.getElementById('p-type').innerText = s.typeLabel; 
        
        if (s.isVideo) {
            document.getElementById('p-img').style.display = 'none';
            media.style.display = 'block';
        } else {
            document.getElementById('p-img').style.display = 'block';
            document.getElementById('p-img').src = s.cover;
            media.style.display = 'none';
        }
        
        hideAllViews();
        document.getElementById('player-view').style.display = 'flex';
        currentMode = 'player';
        media.play();
    }

    function playPause() {
        if(playlist.length === 0) return;
        if(media.paused) media.play();
        else media.pause();
    }

    function nextSong() {
        if(playlist.length === 0) return;
        if(currentMode === 'cover-flow') {
            cfIndex = Math.min(cfIndex + 1, playlist.length - 1);
            updateCFPositions();
        } else {
            currentIndex = (currentIndex + 1) % playlist.length;
            playSong(currentIndex);
        }
    }

    function prevSong() {
        if(playlist.length === 0) return;
        if(currentMode === 'cover-flow') {
            cfIndex = Math.max(cfIndex - 1, 0);
            updateCFPositions();
        } else {
            currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
            playSong(currentIndex);
        }
    }

    function handleCenterClick() {
        if(currentMode === 'cover-flow') playSong(cfIndex);
    }

    function seek(e) {
        const bar = document.getElementById('track-bar');
        const per = e.offsetX / bar.offsetWidth;
        media.currentTime = per * media.duration;
    }

    media.ontimeupdate = () => {
        const per = (media.currentTime / media.duration) * 100;
        document.getElementById('track-fill').style.width = per + '%';
        document.getElementById('time-cur').innerText = formatTime(media.currentTime);
        document.getElementById('time-total').innerText = formatTime(media.duration);
    };

    media.onended = () => nextSong(); 

    function formatTime(sec) {
        if(isNaN(sec)) return "0:00";
        let m = Math.floor(sec/60);
        let s = Math.floor(sec%60);
        return `${m}:${s<10?'0':''}${s}`;
    }

    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').innerText = now.getHours() + ":" + (now.getMinutes()<10?'0':'') + now.getMinutes();
    }, 1000);

</script>
</body>
</html>
